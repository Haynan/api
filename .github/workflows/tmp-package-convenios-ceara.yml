name: TEMP - Empacotar convenios Ceara

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  package:
    if: github.head_ref == 'tmp/package-convenios-ceara-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Baixar resultado completo e validar
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import time
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          url = (
              'https://ceara-api-coletor-temp.vercel.app/api/all'
              '?pageConcurrency=8&yearConcurrency=2&packageRun=20260722'
          )
          out = Path('resultado')
          out.mkdir(parents=True, exist_ok=True)

          started_at = datetime.now(timezone.utc)
          started = time.perf_counter()
          request = urllib.request.Request(
              url,
              headers={
                  'Accept': 'application/json',
                  'User-Agent': 'Mozilla/5.0 OpenDataPackaging/1.0',
                  'Cache-Control': 'no-cache',
              },
          )
          with urllib.request.urlopen(request, timeout=420) as response:
              raw = response.read()
              status = response.status
              content_type = response.headers.get('Content-Type', '')
          download_elapsed = time.perf_counter() - started

          if status != 200 or 'json' not in content_type.lower():
              raise RuntimeError(
                  f'Resposta invalida: status={status}, content_type={content_type}'
              )

          payload = json.loads(raw.decode('utf-8'))
          data = payload.get('data')
          summary = payload.get('summary')
          if not isinstance(data, list) or not isinstance(summary, dict):
              raise RuntimeError('JSON sem data/summary validos')

          target = '07605850000162'
          ids = []
          for row in data:
              document = re.sub(r'\D', '', str(row.get('plain_cpf_cnpj_financiador', '')))
              if document != target:
                  raise RuntimeError(f'CNPJ divergente no id={row.get("id")}: {document}')
              signed_at = str(row.get('data_assinatura', ''))[:10]
              if not ('2007-01-01' <= signed_at <= '2026-07-22'):
                  raise RuntimeError(
                      f'Data fora do intervalo no id={row.get("id")}: {signed_at}'
                  )
              ids.append(row.get('id'))

          if len(ids) != len(set(ids)):
              raise RuntimeError('Existem IDs duplicados no resultado final')
          if summary.get('total_unique_records') != len(data):
              raise RuntimeError(
                  'summary.total_unique_records nao coincide com data'
              )

          (out / 'convenios_07605850000162_2007-01-01_2026-07-22.json').write_bytes(raw)
          manifest = {
              'source_url': url,
              'packaging_started_at_utc': started_at.isoformat(),
              'packaging_finished_at_utc': datetime.now(timezone.utc).isoformat(),
              'download_elapsed_seconds': round(download_elapsed, 6),
              'http_status': status,
              'content_type': content_type,
              'response_bytes': len(raw),
              'records_validated': len(data),
              'all_cnpjs_valid': True,
              'all_dates_valid': True,
              'all_ids_unique': True,
          }
          (out / 'manifesto_empacotamento.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

      - name: Publicar artefato temporario
        uses: actions/upload-artifact@v4
        with:
          name: convenios-ceara-coleta-validada
          path: resultado/
          if-no-files-found: error
          retention-days: 1
