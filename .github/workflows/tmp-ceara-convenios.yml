name: TEMP - Coleta convenios Ceara Transparente

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  collect:
    if: github.head_ref == 'tmp/execute-ceara-convenios-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Coletar todos os convenios e registrar metricas
        shell: bash
        env:
          COLLECTOR_GZIP_B64: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          source = gzip.decompress(base64.b64decode(os.environ['COLLECTOR_GZIP_B64'])).decode('utf-8')
          exec(compile(source, 'collector.py', 'exec'))
          PY
      - name: Resumo do processamento
        if: always()
        shell: bash
        run: |
          if [[ -f resultados/resumo_execucao.json ]]; then
            echo '## Coleta de convenios' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat resultados/resumo_execucao.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Publicar arquivos coletados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: convenios-ceara-07605850000162
          path: resultados/
          if-no-files-found: error
          retention-days: 3
